mandatory=true
versionRange="[1.20.1, 1.21)"
ordering="NONE"
side="BOTH"

[[dependencies."odm"]]
modId="epicfight"
mandatory=true
# Version range for Epic Fight 1.20.1 (usually starts with 20.x)
versionRange="[20.14,)"
ordering="AFTER"
side="BOTH"